  <text x="120" y="235" fill="white" text-anchor="middle">User</text>

  <rect x="220" y="200" width="160" height="60" fill="#ff9900" rx="10"/>
  <text x="300" y="235" fill="white" text-anchor="middle">CloudFront</text>

  <rect x="440" y="200" width="160" height="60" fill="#3b48cc" rx="10"/>
